services:
  # ===== БАЗЫ ДАННЫХ =====
  postgres:
    image: postgres:16-alpine
    container_name: kr5_postgres
    environment:
      POSTGRES_DB: kr5_database
      POSTGRES_USER: kr5_user
      POSTGRES_PASSWORD: Kr5_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kr5_user -d kr5_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kr5_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kr5_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - app-network

  # ===== ДВА БЭКЕНД-СЕРВЕРА =====
  app1:
    build: .
    container_name: kr5_app1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      DB_NAME: kr5_database
      DB_USER: kr5_user
      DB_PASSWORD: Kr5_database
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq
      PORT: 3001
      SERVER_ID: backend-1
      JWT_SECRET: my_super_secret_key_2025
    restart: unless-stopped
    networks:
      - app-network
    command: >
      sh -c "sleep 15 && node scripts/createAdmin.js && node server.js"

  app2:
    build: .
    container_name: kr5_app2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      DB_NAME: kr5_database
      DB_USER: kr5_user
      DB_PASSWORD: Kr5_database
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq
      PORT: 3001
      SERVER_ID: backend-2
      JWT_SECRET: my_super_secret_key_2025
    restart: unless-stopped
    networks:
      - app-network

  # ===== ВОРКЕР =====
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: kr5_worker
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: amqp://rabbitmq
    restart: unless-stopped
    networks:
      - app-network

  # ===== ФРОНТЕНД (React) =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kr5_frontend
    ports:
      - "3000:3000"
    depends_on:
      - app1
      - app2
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: 0
    restart: unless-stopped
    networks:
      - app-network

  # ===== NGINX БАЛАНСИРОВЩИК =====
  nginx:
    image: nginx:alpine
    container_name: kr5_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - frontend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
